<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generar Tarjeta QR — Barber 33 (Staff)</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;0,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --surface: #131313;
    --surface-container: #201f1f;
    --surface-high: #2a2a2a;
    --on-surface: #f0edec;
    --on-surface-muted: #a8aab0;
    --outline-variant: #45474a;
    --secondary: #f9ba82;
    --radius-md: .75rem;
    --radius-lg: 1rem;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--surface); color: var(--on-surface);
    font-family: 'Manrope', sans-serif; padding: 32px 16px; display: flex; justify-content: center;
  }
  .wrap { width: 100%; max-width: 480px; }
  h1 { font-family: 'Newsreader', serif; font-size: 1.4rem; margin: 0 0 4px; }
  p.sub { color: var(--on-surface-muted); font-size: .85rem; margin: 0 0 24px; }
  .panel { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); padding: 22px; }
  label { display: block; font-size: .78rem; color: var(--on-surface-muted); margin: 14px 0 6px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; padding: 10px 12px; border-radius: var(--radius-md);
    border: 1px solid var(--outline-variant); background: var(--surface-high);
    color: var(--on-surface); font-family: inherit; font-size: .92rem;
  }
  input:focus { outline: 2px solid var(--secondary); outline-offset: 1px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button {
    margin-top: 18px; width: 100%; padding: 12px; border: none; border-radius: var(--radius-md);
    background: linear-gradient(135deg,#c47b00,#f9ba82); color: #2f1a00; font-weight: 700;
    font-size: .92rem; cursor: pointer;
  }
  .resultado { margin-top: 24px; display: none; }
  .resultado.show { display: block; }
  .qr-box { background: #fff; border-radius: var(--radius-md); padding: 16px; text-align: center; }
  .qr-box img { max-width: 100%; height: auto; }
  .link-box {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .link-box input { flex: 1; font-size: .78rem; }
  .link-box button {
    margin: 0; width: auto; padding: 10px 16px; background: var(--surface-high); color: var(--on-surface);
    border: 1px solid var(--outline-variant);
  }
  .actions-row { display: flex; gap: 10px; margin-top: 10px; }
  .actions-row a {
    flex: 1; text-align: center; padding: 10px; border-radius: var(--radius-md);
    background: var(--surface-high); border: 1px solid var(--outline-variant);
    color: var(--on-surface); text-decoration: none; font-size: .85rem; font-weight: 600;
  }
  .copied { color: #2ecc71; font-size: .76rem; margin-top: 6px; display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Generar tarjeta de cliente</h1>
  <p class="sub">Herramienta interna de Barber 33 — crea el enlace y código QR de la tarjeta de lealtad de un cliente para imprimirlo o compartirlo por WhatsApp.</p>

  <div class="panel">
    <label for="fNombre">Nombre del cliente</label>
    <input id="fNombre" type="text" placeholder="Ej. Juan Pérez">

    <label for="fTel">Teléfono (opcional)</label>
    <input id="fTel" type="text" placeholder="Ej. 5551234567">

    <label for="fCumple">Cumpleaños (opcional)</label>
    <input id="fCumple" type="date">

    <div class="row">
      <div>
        <label for="fPagados">Cortes pagados</label>
        <input id="fPagados" type="number" min="0" value="0">
      </div>
      <div>
        <label for="fCanjeados">Gratis canjeados</label>
        <input id="fCanjeados" type="number" min="0" value="0">
      </div>
    </div>

    <label for="fBase">URL base de la tarjeta</label>
    <input id="fBase" type="text">

    <button onclick="generar()">Generar QR y enlace</button>
  </div>

  <div class="resultado" id="resultado">
    <div class="qr-box">
      <img id="qrImg" src="" alt="Código QR de la tarjeta">
    </div>
    <div class="link-box">
      <input id="urlGenerada" type="text" readonly>
      <button onclick="copiarUrl()">Copiar</button>
    </div>
    <div class="copied" id="copiedMsg">✓ Enlace copiado</div>
    <div class="actions-row">
      <a id="verTarjeta" href="#" target="_blank">Ver tarjeta</a>
      <a id="enviarWhatsapp" href="#" target="_blank">Enviar por WhatsApp</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('fBase').value = window.location.href.replace(/generar\.html.*$/, 'tarjeta.html');

  function generar() {
    const nombre = document.getElementById('fNombre').value.trim();
    if (!nombre) { alert('Ingresa el nombre del cliente'); return; }
    const tel = document.getElementById('fTel').value.trim();
    const cumple = document.getElementById('fCumple').value;
    const pagados = document.getElementById('fPagados').value || '0';
    const canjeados = document.getElementById('fCanjeados').value || '0';
    const base = document.getElementById('fBase').value.trim();

    const params = new URLSearchParams({ nombre, pagados, canjeados });
    if (tel) params.set('tel', tel);
    if (cumple) params.set('cumple', cumple);

    const url = `${base}?${params.toString()}`;

    document.getElementById('urlGenerada').value = url;
    document.getElementById('qrImg').src =
      `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(url)}`;
    document.getElementById('verTarjeta').href = url;

    const numero = (BARBER33_CONFIG.whatsappNumero || '').replace(/\D/g, '');
    const msg = `Hola ${nombre}, aquí está tu tarjeta de lealtad digital de Barber 33: ${url}`;
    document.getElementById('enviarWhatsapp').href =
      `https://wa.me/${tel ? tel.replace(/\D/g, '') : numero}?text=${encodeURIComponent(msg)}`;

    document.getElementById('resultado').classList.add('show');
    document.getElementById('copiedMsg').style.display = 'none';
  }

  function copiarUrl() {
    const input = document.getElementById('urlGenerada');
    input.select();
    navigator.clipboard.writeText(input.value).then(() => {
      document.getElementById('copiedMsg').style.display = 'block';
    });
  }
</script>
</body>
</html>
