<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Únete a la Lealtad Digital — Barber 33</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --surface:            #131313;
    --surface-container:  #201f1f;
    --surface-high:       #2a2a2a;
    --secondary:              #f9ba82;
    --secondary-container:    #683d0f;
    --on-surface:         #f0edec;
    --on-surface-variant: #c8cace;
    --on-surface-muted:   #a8aab0;
    --outline-variant:    #45474a;
    --radius-sm: 0.375rem;
    --radius-md: 0.75rem;
    --radius-lg: 1rem;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--surface); color: var(--on-surface);
    font-family: 'Manrope', sans-serif; display: flex; justify-content: center;
    padding: 32px 16px 40px;
  }
  .wrap { width: 100%; max-width: 420px; }
  .brand { text-align: center; margin-bottom: 22px; }
  .brand .mark {
    font-family: 'Newsreader', serif; font-size: 1.8rem; font-weight: 700;
    letter-spacing: .04em;
  }
  .brand .sub {
    font-size: .78rem; color: var(--on-surface-muted); margin-top: 6px; line-height: 1.5;
  }
  .stamp-preview {
    display: flex; justify-content: center; gap: 8px; margin: 22px 0;
  }
  .stamp-preview .dot {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px dashed var(--outline-variant);
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem; color: var(--on-surface-muted);
  }
  .card {
    background: var(--surface-container); border: 1px solid var(--outline-variant);
    border-radius: var(--radius-lg); padding: 22px;
  }
  label { display: block; font-size: .78rem; color: var(--on-surface-muted); margin: 14px 0 6px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; padding: 12px; border-radius: var(--radius-md);
    border: 1px solid var(--outline-variant); background: var(--surface-high);
    color: var(--on-surface); font-family: inherit; font-size: 1rem;
  }
  input:focus { outline: 2px solid var(--secondary); outline-offset: 1px; }
  button {
    margin-top: 20px; width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    background: linear-gradient(135deg,#c47b00,#f9ba82); color: #2f1a00; font-weight: 700;
    font-size: .95rem; cursor: pointer;
  }
  .footnote {
    text-align: center; font-size: .72rem; color: var(--on-surface-muted);
    margin-top: 18px; line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="mark" id="negocioNombre">BARBER 33</div>
    <div class="sub">Únete a nuestro programa de lealtad<br>y llévate un corte gratis por cada 5.</div>
  </div>

  <div class="stamp-preview">
    <div class="dot">✂</div><div class="dot">✂</div><div class="dot">✂</div><div class="dot">✂</div><div class="dot">✂</div>
  </div>

  <div class="card">
    <label for="fNombre">Tu nombre</label>
    <input id="fNombre" type="text" placeholder="Ej. Juan Pérez" autocomplete="name">

    <label for="fTel">Tu teléfono (opcional)</label>
    <input id="fTel" type="tel" placeholder="Ej. 5551234567" autocomplete="tel">

    <label for="fCumple">Fecha de cumpleaños</label>
    <input id="fCumple" type="date" autocomplete="bday">

    <button onclick="crearTarjeta()">Crear mi tarjeta digital</button>
  </div>

  <div class="footnote">
    Tu tarjeta se guarda en este celular.<br>
    Muéstrasela a tu barbero en cada visita para sumar tus cortes.
  </div>
</div>

<script>
  const STORAGE_KEY = 'barber33_cliente';

  document.getElementById('negocioNombre').textContent = (BARBER33_CONFIG.nombreNegocio || 'Barber 33').toUpperCase();

  // Si este celular ya tiene una tarjeta creada, saltamos directo a ella.
  const existente = localStorage.getItem(STORAGE_KEY);
  if (existente) {
    const data = JSON.parse(existente);
    const params = new URLSearchParams({
      nombre: data.nombre,
      pagados: data.pagados,
      canjeados: data.canjeados,
    });
    if (data.tel) params.set('tel', data.tel);
    if (data.cumple) params.set('cumple', data.cumple);
    window.location.replace(`tarjeta.html?${params.toString()}`);
  }

  function crearTarjeta() {
    const nombre = document.getElementById('fNombre').value.trim();
    if (!nombre) { alert('Escribe tu nombre para crear tu tarjeta.'); return; }
    const tel = document.getElementById('fTel').value.trim();

    const cumple = document.getElementById('fCumple').value;

    const params = new URLSearchParams({ nombre, pagados: '0', canjeados: '0' });
    if (tel) params.set('tel', tel);
    if (cumple) params.set('cumple', cumple);

    window.location.replace(`tarjeta.html?${params.toString()}`);
  }
</script>
</body>
</html>
